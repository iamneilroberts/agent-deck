<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AgentDeck — Spike C</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b0d12;
    color: #e6e9ef;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 14px;
    border-bottom: 1px solid #232732;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky;
    top: 0;
    background: #0b0d12;
  }
  h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 999px;
    background: #1a1e27;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #666; flex: none; }
  .status[data-state="connected"] .dot { background: #35d07f; }
  .status[data-state="connecting"] .dot { background: #f2c94c; }
  .status[data-state="disconnected"] .dot { background: #eb5757; }
  button {
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid #2c313d;
    background: #171a21;
    color: #e6e9ef;
  }
  button:active { background: #232732; }
  main { flex: 1; overflow-y: auto; padding: 10px 12px 24px; }
  .meta { font-size: 11px; color: #8b93a3; margin-bottom: 10px; line-height: 1.5; }
  .event {
    border: 1px solid #232732;
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 8px;
    background: #10131a;
  }
  .event.replayed { border-color: #3a2f14; background: #16130c; }
  .event .row1 {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #8b93a3;
    margin-bottom: 4px;
  }
  .event .type { color: #7fb2ff; font-weight: 600; }
  .event pre {
    margin: 0;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .heartbeat { font-size: 11px; color: #555c6b; padding: 2px 0 8px; }
</style>
</head>
<body>
<header>
  <h1>AgentDeck Spike C</h1>
  <div style="display:flex; align-items:center; gap:8px;">
    <span class="status" id="status" data-state="connecting"><span class="dot"></span><span id="statusText">connecting</span></span>
    <button id="toggleBtn" type="button">Disconnect</button>
  </div>
</header>
<main>
  <div class="meta" id="meta">lastSeq: — · events: 0</div>
  <div id="log"></div>
</main>
<script>
(() => {
  "use strict";

  const statusEl = document.getElementById("status");
  const statusTextEl = document.getElementById("statusText");
  const toggleBtn = document.getElementById("toggleBtn");
  const logEl = document.getElementById("log");
  const metaEl = document.getElementById("meta");

  /** @type {number} highest event sequence rendered so far; 0 means "nothing seen yet". */
  let lastSeq = 0;
  let eventCount = 0;
  let ws = null;
  let userDisconnected = false;
  let reconnectAttempt = 0;
  let reconnectTimer = null;
  let replaying = false;

  function setStatus(state, text) {
    statusEl.dataset.state = state;
    statusTextEl.textContent = text;
  }

  function updateMeta() {
    metaEl.textContent = `lastSeq: ${lastSeq} · events: ${eventCount}`;
  }

  function renderEvent(event, isReplayed) {
    const div = document.createElement("div");
    div.className = "event" + (isReplayed ? " replayed" : "");
    const row1 = document.createElement("div");
    row1.className = "row1";
    const typeSpan = document.createElement("span");
    typeSpan.className = "type";
    typeSpan.textContent = `#${event.sequence} ${event.type}`;
    const timeSpan = document.createElement("span");
    timeSpan.textContent = new Date(event.timestamp).toLocaleTimeString();
    row1.append(typeSpan, timeSpan);
    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(event.payload);
    div.append(row1, pre);
    logEl.prepend(div);
    // Keep the DOM bounded on a phone.
    while (logEl.children.length > 200) {
      logEl.removeChild(logEl.lastChild);
    }
  }

  function renderHeartbeat() {
    const div = document.createElement("div");
    div.className = "heartbeat";
    div.textContent = `heartbeat @ ${new Date().toLocaleTimeString()}`;
    logEl.prepend(div);
  }

  function wsUrl() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    return `${proto}//${location.host}/ws?lastSeq=${lastSeq}`;
  }

  function scheduleReconnect() {
    if (userDisconnected) return;
    reconnectAttempt += 1;
    const delay = Math.min(1000 * 2 ** (reconnectAttempt - 1), 15000);
    setStatus("connecting", `reconnecting in ${Math.round(delay / 1000)}s…`);
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, delay);
  }

  function connect() {
    if (userDisconnected) return;
    setStatus("connecting", "connecting…");
    replaying = false;
    const socket = new WebSocket(wsUrl());
    ws = socket;

    socket.addEventListener("open", () => {
      reconnectAttempt = 0;
    });

    socket.addEventListener("message", (ev) => {
      let msg;
      try {
        msg = JSON.parse(ev.data);
      } catch {
        return;
      }
      if (msg.type === "event") {
        const event = msg.event;
        if (event.sequence <= lastSeq) return; // defend against any accidental duplicate
        renderEvent(event, replaying);
        lastSeq = event.sequence;
        eventCount += 1;
        updateMeta();
      } else if (msg.type === "replayComplete") {
        replaying = false;
        setStatus("connected", "connected");
      } else if (msg.type === "heartbeat") {
        renderHeartbeat();
      }
    });

    socket.addEventListener("close", () => {
      if (ws === socket) {
        setStatus("disconnected", "disconnected");
        scheduleReconnect();
      }
    });

    socket.addEventListener("error", () => {
      socket.close();
    });

    replaying = lastSeq > 0;
  }

  toggleBtn.addEventListener("click", () => {
    if (userDisconnected) {
      userDisconnected = false;
      toggleBtn.textContent = "Disconnect";
      reconnectAttempt = 0;
      connect();
    } else {
      userDisconnected = true;
      toggleBtn.textContent = "Reconnect";
      clearTimeout(reconnectTimer);
      if (ws) ws.close();
      setStatus("disconnected", "disconnected (manual)");
    }
  });

  updateMeta();
  connect();
})();
</script>
</body>
</html>
